<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>漢字</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>漢</text></svg>">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="loading">
      <div class="loading-kanji">漢</div>
      <div class="loading-text">Loading</div>
    </div>

    <!-- Main -->
    <div id="main" class="hidden">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="onyomi-nav" id="onyomiNav"></div>

      <div class="card-container" id="cardContainer">
        <div class="card" id="card">
          <div class="card-header">
            <span class="counter" id="counter"></span>
          </div>

          <div class="kanji-display" id="kanjiDisplay"></div>

          <div class="meanings" id="meanings"></div>

          <div class="readings">
            <div class="reading-group" id="onyomiGroup">
              <span class="reading-label on-label">音</span>
              <span class="reading-values" id="onyomiReadings"></span>
            </div>
            <div class="reading-group" id="kunyomiGroup">
              <span class="reading-label kun-label">訓</span>
              <span class="reading-values" id="kunyomiReadings"></span>
            </div>
          </div>

          <div class="words-section" id="wordsSection">
            <div class="words-list" id="wordsList"></div>
          </div>
        </div>
      </div>

      <div class="nav-hint" id="navHint">swipe to navigate</div>
    </div>

    <!-- Stroke order modal -->
    <div id="strokeModal" class="stroke-modal hidden">
      <div class="stroke-backdrop" id="strokeBackdrop"></div>
      <div class="stroke-panel">
        <div class="stroke-header">
          <span class="stroke-count" id="strokeCount"></span>
          <button class="stroke-close" id="strokeClose" aria-label="Close">&times;</button>
        </div>
        <div class="stroke-canvas" id="strokeCanvas"></div>
        <div class="stroke-controls">
          <button class="stroke-play" id="strokePlay" aria-label="Play">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
